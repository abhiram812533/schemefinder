<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Agent Login - SchemeFinder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .support-bg { background: radial-gradient(circle at bottom left, #064e3b, #0f172a 60%, #000); }
    </style>
</head>
<body class="support-bg flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full animate-fade-in">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-green-600 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-green-500/40">
                <span class="text-4xl">💬</span>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Support Agent Portal</h1>
            <p class="text-green-400">Customer Care Login</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="mb-6 p-4 rounded-xl text-sm {{ 'bg-red-500/20 text-red-400 border border-red-500/30' if category == 'error' else 'bg-green-500/20 text-green-400 border border-green-500/30' }}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="glass p-8 rounded-3xl border border-green-500/20 shadow-2xl">
            <form action="/customer/login" method="POST" class="space-y-5">
                <input type="hidden" name="role" value="customer">
                <div>
                    <label class="block text-sm font-medium mb-2 text-gray-300">Username</label>
                    <input type="text" name="username" required
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 transition-all"
                        placeholder="Enter your username">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2 text-gray-300">Password</label>
                    <input type="password" name="password" required
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 transition-all"
                        placeholder="••••••••">
                </div>
                <button type="submit"
                    class="w-full bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-green-500/20">
                    Login to Support Portal
                </button>
            </form>
        </div>

        <div class="mt-6 text-center space-x-4">
            <a href="/" class="text-sm text-gray-500 hover:text-white transition-colors">← User Login</a>
            <span class="text-gray-700">|</span>
            <a href="/admin/login" class="text-sm text-gray-500 hover:text-white transition-colors">Admin Login</a>
        </div>
    </div>
</body>
</html>
