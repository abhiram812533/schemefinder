<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login - SchemeFinder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="max-w-md w-full glass p-8 rounded-3xl animate-fade-in">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-semibold mb-2 bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">SchemeFinder</h1>
            <p class="text-gray-400">Customer Gateway & Opportunities</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="mb-6 p-4 rounded-xl text-sm font-medium {% if category == 'error' or category == 'danger' %}bg-red-500/20 text-red-400 border border-red-500/30{% else %}bg-orange-500/20 text-orange-400 border border-orange-500/30{% endif %} animate-fade-in">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="flex mb-8 bg-black/20 p-1 rounded-xl">
            <button id="loginTab" class="flex-1 py-2 text-sm font-medium rounded-lg transition-all bg-blue-600 text-white">Login</button>
            <button id="signupTab" class="flex-1 py-2 text-sm font-medium rounded-lg transition-all text-gray-400 hover:text-white">New User?</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2 text-gray-300">Mobile Number (or Username)</label>
                <input type="text" name="mobile" required class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Enter mobile or username">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2 text-gray-300">Password</label>
                <input type="password" name="password" required class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-semibold py-3 rounded-xl transition-all card-hover shadow-lg">
                Login
            </button>
        </form>

        <!-- Signup Form (Hidden by default) -->
        <form id="signupForm" action="/signup" method="POST" class="space-y-6 hidden">
            <div>
                <label class="block text-sm font-medium mb-2 text-gray-300">Full Name</label>
                <input type="text" name="name" required class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Enter your name">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2 text-gray-300">Mobile Number</label>
                <input type="tel" name="mobile" required class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Enter mobile number">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2 text-gray-300">Create Password</label>
                <input type="password" name="password" required class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="••••••••">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2 text-gray-300">Confirm Password</label>
                <input type="password" name="confirm_password" required class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-green-600 to-blue-600 hover:from-green-700 hover:to-blue-700 text-white font-semibold py-3 rounded-xl transition-all card-hover shadow-lg">
                Register & Login
            </button>
        </form>

        <div class="mt-8 text-center space-x-4">
            <a href="/admin/login" class="text-sm text-gray-400 hover:text-white transition-colors">🔐 Admin Login</a>
            <span class="text-gray-600">|</span>
            <a href="/customer/login" class="text-sm text-green-500 hover:text-green-300 transition-colors">💬 Support Agent Login</a>
            <span class="text-gray-600">|</span>
            <a href="/forgot_password" class="text-sm text-gray-400 hover:text-white transition-colors">Forgot Password?</a>
        </div>
    </div>

    <script>
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');

        loginTab.addEventListener('click', () => {
            loginTab.classList.add('bg-blue-600', 'text-white');
            loginTab.classList.remove('text-gray-400');
            signupTab.classList.remove('bg-blue-600', 'text-white');
            signupTab.classList.add('text-gray-400');
            loginForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
        });

        signupTab.addEventListener('click', () => {
            signupTab.classList.add('bg-blue-600', 'text-white');
            signupTab.classList.remove('text-gray-400');
            loginTab.classList.remove('bg-blue-600', 'text-white');
            loginTab.classList.add('text-gray-400');
            signupForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
        });
    </script>
</body>
</html>
