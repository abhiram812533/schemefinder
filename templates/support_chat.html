<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Chat - SchemeFinder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-[#0f172a] text-white min-h-screen flex flex-col">
    <!-- Header -->
    <div class="glass-dark p-6 border-b border-white/10 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-4">
            <a href="{{ '/admin/dashboard' if session['role'] == 'admin' else '/user/dashboard' }}" class="text-gray-400 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg>
            </a>
            <h1 class="text-xl font-semibold">Support Chat</h1>
        </div>
        <div class="text-sm text-gray-400">Logged in as: <span class="text-blue-400">{{ session['user'] }}</span></div>
    </div>

    <!-- Chat Area -->
    <div class="flex-1 overflow-y-auto p-6 space-y-4 max-w-4xl mx-auto w-full" id="chatContainer">
        {% for msg in messages %}
        <div class="flex {{ 'justify-end' if msg['sender_role'] == session['role'] else 'justify-start' }}">
            <div class="max-w-[80%] {{ 'bg-blue-600 rounded-l-2xl rounded-tr-2xl' if msg['sender_role'] == session['role'] else 'glass-dark rounded-r-2xl rounded-tl-2xl' }} p-4 shadow-xl">
                <div class="text-[10px] text-white/50 mb-1 uppercase tracking-widest font-bold">
                    {{ 'You' if msg['sender_role'] == session['role'] else msg['user_name'] if session['role'] == 'admin' else 'Support Agent' }}
                </div>
                <div class="text-sm leading-relaxed">{{ msg['message'] }}</div>
                <div class="text-[9px] text-white/40 mt-2 text-right">{{ msg['created_at'].strftime('%H:%M') }}</div>
            </div>
        </div>
        {% endfor %}
    </div>

    <!-- Input Area -->
    <div class="glass-dark p-6 border-t border-white/10 sticky bottom-0">
        <form action="/support/chat{{ '?target_user=' + request.args.get('target_user') if request.args.get('target_user') else '' }}" method="POST" class="max-w-4xl mx-auto flex space-x-4">
            <input type="text" name="message" required class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all placeholder-gray-500" placeholder="Type your message here...">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-8 rounded-xl font-semibold transition-all flex items-center shadow-lg shadow-blue-600/20">
                Send
                <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
            </button>
        </form>
    </div>

    <script>
        // Auto-scroll to bottom
        const container = document.getElementById('chatContainer');
        container.scrollTop = container.scrollHeight;
    </script>
</body>
</html>
