<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Customer - SchemeFinder Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-2xl mx-auto">
        <a href="/admin/dashboard" class="inline-flex items-center text-gray-400 hover:text-white mb-8 transition-colors">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg>
            Back to Dashboard
        </a>

        <div class="glass p-10 rounded-3xl animate-fade-in">
            <h1 class="text-3xl font-bold mb-8 text-blue-400">Register New Customer</h1>
            
            <form action="/admin/add_customer" method="POST" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2 text-gray-400">Customer Full Name</label>
                        <input type="text" name="name" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="John Doe">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2 text-gray-400">Mobile Number</label>
                        <input type="tel" name="mobile" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="9988776655">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2 text-gray-400">Unique Username</label>
                        <input type="text" name="username" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="john_sf">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2 text-gray-400">Initial Password</label>
                        <input type="password" name="password" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2 text-gray-400">Account Type (Role)</label>
                        <select name="role" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="user">Regular User (App User)</option>
                            <option value="customer">Customer Support Agent</option>
                        </select>
                    </div>
                </div>

                <div class="bg-blue-500/10 p-4 rounded-xl border border-blue-500/20 text-sm text-blue-300">
                    <p><strong>Note:</strong> Regular Users login at the main page. Support Agents login at <code>/customer/login</code>.</p>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-xl shadow-blue-500/20">
                    Create Customer Account
                </button>
            </form>
        </div>
    </div>
</body>
</html>
