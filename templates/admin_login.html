<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access - SchemeFinder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }
        .admin-bg {
            background: radial-gradient(circle at top right, #1e3a8a, #0f172a 50%, #000);
        }
        .glow-box {
            position: relative;
            overflow: hidden;
        }
        .glow-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #3b82f6);
            animation: rotate 4s linear infinite;
        }
        .glow-inner {
            background: #0f172a;
            position: absolute;
            inset: 2px;
            border-radius: 1.5rem;
            z-index: 10;
        }
        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="admin-bg flex items-center justify-center min-vh-100 p-4">
    <div class="max-w-md w-full animate-fade-in relative">
        <div class="glow-box h-[500px] w-full rounded-3xl p-[2px]">
            <div class="glow-inner flex flex-col items-center justify-center p-8">
                <div class="mb-10 text-center">
                    <div class="w-20 h-20 bg-blue-600 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-blue-500/50">
                        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    </div>
                    <h1 class="text-3xl font-bold text-white mb-2">Admin Portal</h1>
                    <p class="text-blue-400 font-medium">Internal Systems Only</p>
                </div>

                <form action="/login" method="POST" class="w-full space-y-6 z-20">
                    <input type="hidden" name="role" value="admin">
                    <div>
                        <input type="tel" name="mobile" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all" placeholder="Admin Mobile">
                    </div>
                    <div>
                        <input type="password" name="password" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all" placeholder="System Password">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all transform hover:scale-[1.02] shadow-xl shadow-blue-500/20">
                        Authorize Access
                    </button>
                </form>

                <div class="mt-8">
                    <a href="/" class="text-gray-500 hover:text-gray-300 text-sm transition-colors">Return to User Portal</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
