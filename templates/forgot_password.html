<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SchemeFinder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full glass p-10 rounded-3xl animate-fade-in">
        <h1 class="text-3xl font-bold mb-8 text-center bg-gradient-to-r from-red-400 to-orange-400 bg-clip-text text-transparent">Recovery</h1>
        <p class="text-gray-400 text-center mb-8">Enter your registered mobile to reset</p>
        
        <form action="/forgot_password" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2 text-gray-400">Mobile Number</label>
                <input type="tel" name="mobile" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:ring-2 focus:ring-orange-500 outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2 text-gray-400">New Secure Password</label>
                <input type="password" name="new_password" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:ring-2 focus:ring-orange-500 outline-none transition-all">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-orange-600 to-red-600 text-white font-bold py-4 rounded-xl transition-all shadow-xl shadow-orange-500/20">
                Reset Access
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="/" class="text-sm text-gray-500 hover:text-white transition-colors">Back to Login</a>
        </div>
    </div>
</body>
</html>
