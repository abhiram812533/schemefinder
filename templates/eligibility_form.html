<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eligibility Check - SchemeFinder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="p-8 flex items-center justify-center min-h-screen">
    <div class="max-w-2xl w-full glass p-10 rounded-[2.5rem] border-l-4 border-purple-500 animate-fade-in relative">
        <a href="/user/dashboard" class="absolute top-8 left-8 text-gray-500 hover:text-white transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg>
        </a>
        
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold mb-2">Eligibility Checker</h1>
            <p class="text-gray-400">Fill the details to see matching schemes</p>
        </div>

        <form action="/user/eligibility" method="POST" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium mb-2 text-gray-400">Full Name</label>
                    <input type="text" name="name" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2 text-gray-400">Age</label>
                    <input type="number" name="age" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2 text-gray-400">State</label>
                    <input type="text" name="state" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2 text-gray-400">Caste</label>
                    <select name="caste" class="w-full bg-[#1a1c2e] border border-white/10 rounded-xl px-4 py-3 outline-none">
                        <option>General</option>
                        <option>OBC</option>
                        <option>SC</option>
                        <option>ST</option>
                    </select>
                </div>
                 <div>
                    <label class="block text-sm font-medium mb-2 text-gray-400">Occupation</label>
                    <select name="occupation" class="w-full bg-[#1a1c2e] border border-white/10 rounded-xl px-4 py-3 outline-none">
                        <option>Student</option>
                        <option>Farmer</option>
                        <option>Worker</option>
                        <option>Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2 text-gray-400">Annual Income (₹)</label>
                    <input type="number" name="income" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
            </div>

            <button type="submit" class="w-full mt-6 bg-gradient-to-r from-purple-600 to-blue-600 text-white font-bold py-4 rounded-xl shadow-xl shadow-purple-500/20 hover:scale-[1.01] transition-all">
                Check Now
            </button>
        </form>
    </div>
</body>
</html>
